<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تجهيز النسخة المحلية - محرك الكتب الملكي</title>
    <style>
        :root {
            --royal-gold: #b8860b;
            --royal-green: #6B8E23;
            --bg-color: #f4f6f8;
        }

        @font-face { 
            font-family: 'Amiri'; 
            src: url('fonts/Amiri-Regular.ttf') format('truetype'); 
        }

        body { 
            font-family: 'Amiri', serif; 
            text-align: center; 
            padding: 50px 20px; 
            background: var(--bg-color); 
            color: #333;
        }

        .setup-card { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            display: inline-block; 
            max-width: 550px; 
            width: 100%;
            border-top: 6px solid var(--royal-gold);
        }

        h2 { color: var(--royal-green); margin-bottom: 20px; font-size: 24pt; }
        p { font-size: 14pt; line-height: 1.6; color: #555; margin-bottom: 30px; }

        .progress-bar { 
            width: 100%; 
            background: #eee; 
            height: 24px; 
            border-radius: 12px; 
            margin: 25px 0; 
            overflow: hidden; 
            display: none; 
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        .progress-fill { 
            width: 0%; 
            height: 100%; 
            background: linear-gradient(90deg, var(--royal-green), #8eb045); 
            transition: width 0.3s ease; 
        }

        button { 
            background: var(--royal-gold); 
            color: white; 
            border: none; 
            padding: 12px 35px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16pt; 
            font-family: 'Amiri', serif;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(184, 134, 11, 0.3);
        }

        button:hover { 
            background: var(--royal-green); 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(107, 142, 35, 0.3);
        }

        #status { font-weight: bold; margin-top: 15px; color: #444; min-height: 1.5em; }
    </style>
</head>
<body>

    <div class="setup-card">
        <h2>تجهيز الموقع للعمل دون إنترنت 📦</h2>
        <p>سيتم الآن حفظ ملفات النظام (الواجهات، الخطوط، والمحرك) على جهازك لتعمل في أي وقت وبسرعة فائقة حتى عند انقطاع الشبكة.</p>
        
        <button id="startBtn" onclick="installOffline()">ابدأ التجهيز الآن</button>
        
        <div id="progressCont" class="progress-bar">
            <div id="progressFill" class="progress-fill"></div>
        </div>
        <p id="status"></p>
    </div>

<script>
    async function installOffline() {
        const btn = document.getElementById('startBtn');
        const pCont = document.getElementById('progressCont');
        const pFill = document.getElementById('progressFill');
        const status = document.getElementById('status');

        btn.style.display = 'none';
        pCont.style.display = 'block';
        status.innerText = "جاري الاتصال بمحرك التخزين المحلي...⏳";
        
        if ('serviceWorker' in navigator) {
            try {
                // تسجيل الـ Service Worker
                const reg = await navigator.serviceWorker.register('sw.js');
                
                // الانتظار حتى يصبح نشطاً (للمرة الأولى)
                if (!navigator.serviceWorker.controller) {
                    status.innerText = "جاري تفعيل محرك الأوف لاين لأول مرة...⏳";
                    await new Promise(resolve => {
                        const listener = () => {
                            if (navigator.serviceWorker.controller) {
                                navigator.serviceWorker.removeEventListener('controllerchange', listener);
                                resolve();
                            }
                        };
                        navigator.serviceWorker.addEventListener('controllerchange', listener);
                    });
                }

                status.innerText = "تم الاتصال، جاري تحميل ملفات النظام... 0%";

                // محاكاة شريط التقدم (بناءً على منطقك المميز)
                let progress = 0;
                const interval = setInterval(() => {
                    // منطق زيادة السرعة التدريجي
                    if (progress <= 20) progress += 2;
                    else if (progress < 50) progress += 4;
                    else if (progress < 75) progress += 2;
                    else if (progress < 90) progress += 1;
                    else if (progress < 99) progress += 0.3; // إبطاء عند النهاية للواقعية
                    else progress += 0.1;

                    if (progress >= 100) progress = 100;

                    pFill.style.width = progress + '%';
                    status.innerText = `جاري تحميل ملفات الموقع... ${Math.floor(progress)}%`;

                    if (progress >= 100) {
                        clearInterval(interval);
                        status.style.color = "var(--royal-green)";
                        status.innerText = "✅ اكتمل التجهيز! يمكنك الآن استخدام الموقع دون إنترنت.";
                        setTimeout(() => window.location.href = 'index.html', 1500);
                    }
                }, 150); // سرعة تحديث 150ms تجعل الحركة ناعمة جداً
                
            } catch (e) {
                console.error("Install Error:", e);
                status.innerText = "❌ حدث خطأ أثناء التجهيز. تأكد من إعدادات المتصفح.";
                btn.style.display = 'block';
                btn.innerText = "إعادة المحاولة";
            }
        } else {
            status.innerText = "عذراً، متصفحك لا يدعم هذه الميزة.";
        }
    }
</script>
</body>
</html>
