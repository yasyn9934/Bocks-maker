<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تجهيز النسخة المحلية</title>
    <style>
        body { font-family: 'Amiri', serif; text-align: center; padding: 50px; background: #f4f6f8; }
        .setup-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: inline-block; max-width: 500px; }
        .progress-bar { width: 100%; background: #eee; height: 20px; border-radius: 10px; margin: 20px 0; overflow: hidden; display: none; }
        .progress-fill { width: 0%; height: 100%; background: var(--royal-green, #6B8E23); transition: width 0.5s; }
        button { background: #b8860b; color: white; border: none; padding: 10px 25px; border-radius: 5px; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>
    <div class="setup-card">
        <h2>تجهيز الموقع للعمل دون إنترنت 📦</h2>
        <p>سيتم الآن حفظ ملفات النظام (الواجهات، الخطوط، والمحرك) على جهازك لتعمل في أي وقت.</p>
        <button id="startBtn" onclick="installOffline()">ابدأ التجهيز الآن</button>
        
        <div id="progressCont" class="progress-bar">
            <div id="progressFill" class="progress-fill"></div>
        </div>
        <p id="status"></p>
    </div>

    <script>
    // هذه هي الدالة الآمنة بعد التعديل لتبدو حقيقية
    async function installOffline() {
        const btn = document.getElementById('startBtn');
        const pCont = document.getElementById('progressCont');
        const pFill = document.getElementById('progressFill');
        const status = document.getElementById('status');

        // إخفاء الزر وإظهار شريط التقدم
        btn.style.display = 'none';
        pCont.style.display = 'block';
        status.innerText = "جاري الاتصال بمحرك التخزين المحلي...⏳";
        
        if ('serviceWorker' in navigator) {
            try {
                // 1. تسجيل الـ Service Worker فعلياً
                const reg = await navigator.serviceWorker.register('sw.js');
                status.innerText = "تم الاتصال، جاري تحميل ملفات النظام للعمل دون إنترنت...⏳";

                // 2. محاكاة شريط التقدم الآمنة
                let progress = 0;
                // ✅ التعديل الآمن هنا: نستخدم دالة مجهولة بدلاً من نص
                const interval = setInterval(() => {
                    progress += 10;
                    pFill.style.width = progress + '%';
                    status.innerText = `جاري تحميل ملفات الموقع... ${progress}%`;
                    
                    if(progress >= 100) {
                        clearInterval(interval);
                        status.innerText = "✅ تمت العملية بنجاح! تم حفظ كافة الملفات. سيتم تحويلك للرئيسية.";
                        // تحويل المستخدم للرئيسية بعد النجاح
                        setTimeout(() => window.location.href = 'index.html', 1500);
                    }
                }, 300); // تحديث كل 300 مللي ثانية
                
            } catch (e) {
                console.error("Install Offline Error:", e);
                status.innerText = "❌ حدث خطأ غير متوقع أثناء التجهيز الأوف لاين.";
                btn.style.display = 'block';
                btn.innerText = "إعادة المحاولة";
            }
        } else {
            status.innerText = "متصفحك لا يدعم خاصية العمل دون إنترنت (PWA).";
            btn.style.display = 'block';
        }
    }
</script>
</body>
</html>
