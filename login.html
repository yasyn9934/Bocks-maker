<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صانع الكتب - الدخول والتسجيل</title>
    <style>
        @font-face { font-family: 'Amiri'; src: url('fonts/Amiri-Regular.ttf') format('truetype'); }
        @font-face { font-family: 'Aref Ruqaa'; src: url('fonts/ArefRuqaa-Bold.ttf') format('truetype'); }

        body {
            font-family: 'Amiri', serif;
            background-color: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .auth-container {
            background: #fff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            border-top: 6px solid #b8860b;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .auth-container h1 { color: #6B8E23; font-family: 'Aref Ruqaa', serif; font-size: 28pt; margin-bottom: 5px; }
        .auth-container p { color: #666; margin-bottom: 25px; font-size: 14pt; }
        
        .form-section { display: none; flex-direction: column; gap: 15px; }
        .form-section.active { display: flex; animation: fadeIn 0.4s ease; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        input {
            width: 100%; padding: 12px; font-family: 'Amiri', serif; font-size: 14pt;
            border: 1px solid #ddd; border-radius: 8px; outline: none; box-sizing: border-box;
        }
        input:focus { border-color: #b8860b; box-shadow: 0 0 5px rgba(184, 134, 11, 0.3); }

        .btn {
            padding: 12px; font-family: 'Aref Ruqaa', serif; font-size: 16pt;
            border: none; border-radius: 8px; cursor: pointer; color: white; transition: 0.3s;
        }
        .btn-primary { background-color: #6B8E23; }
        .btn-primary:hover { background-color: #55711b; }
        .btn-primary:disabled { background-color: #ccc; cursor: not-allowed; }

        .switch-link {
            margin-top: 15px; color: #1976d2; cursor: pointer; font-size: 13pt; text-decoration: underline; background: none; border: none; font-family: 'Amiri', serif;
        }
        .status-msg { margin-top: 15px; font-size: 12pt; font-weight: bold; }
    </style>
</head>
<body>

    <div class="auth-container">
        <h1>صانع الكتب</h1>
        <p id="subTitle">مرحباً بك في مكتبتك السحابية</p>

        <div id="loginForm" class="form-section active">
            <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="loginPass" placeholder="كلمة المرور">
            <button class="btn btn-primary" id="btnLogin" onclick="login()">تسجيل الدخول</button>
            <button class="switch-link" onclick="switchForm('registerForm', 'إنشاء حساب جديد')">ليس لديك حساب؟ سجل الآن مجاناً</button>
        </div>

        <div id="registerForm" class="form-section">
            <input type="text" id="regUser" placeholder="اسم المستخدم (مثال: أبو عبد الله)">
            <input type="email" id="regEmail" placeholder="البريد الإلكتروني الحقيقي">
            <input type="password" id="regPass" placeholder="كلمة المرور">
            <button class="btn btn-primary" id="btnRegister" onclick="requestOTP()">إرسال رمز التحقق</button>
            <button class="switch-link" onclick="switchForm('loginForm', 'تسجيل الدخول')">لديك حساب بالفعل؟ سجل دخولك</button>
        </div>

        <div id="otpForm" class="form-section">
            <p style="color: #b8860b; font-size: 12pt;">تم إرسال رمز مكون من 6 أرقام إلى بريدك. (قد تجده في الرسائل غير المرغوب فيها Spam).</p>
            <input type="text" id="otpCode" placeholder="أدخل الرمز هنا" style="text-align: center; letter-spacing: 5px; font-weight: bold;">
            <button class="btn btn-primary" id="btnVerify" onclick="verifyOTP()">تأكيد وإنشاء الحساب</button>
            <button class="switch-link" onclick="switchForm('registerForm', 'إنشاء حساب جديد')">تعديل الإيميل</button>
        </div>

        <div id="statusMsg" class="status-msg"></div>
        <button onclick="window.location.href='index.html'" style="margin-top: 25px; background: transparent; border: none; color: #888; cursor: pointer; text-decoration: underline; font-family: 'Amiri', serif; font-size: 12pt;">العودة للرئيسية كزائر</button>
    </div>

    <script>
        let indexPage = "./"
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzIeRXPFDmjC7kgGkwpDtralJ-YtkS8xeUgVTbx3kpZ76nb9osCCiY4v1m0NZBISHQu/exec";
        let tempRegData = {}; // لحفظ البيانات مؤقتاً بين خطوتي التسجيل

        function switchForm(formId, title) {
            document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));
            document.getElementById(formId).classList.add('active');
            document.getElementById('subTitle').innerText = title;
            document.getElementById('statusMsg').innerText = '';
        }

        function showStatus(msg, color) {
            const status = document.getElementById('statusMsg');
            status.innerText = msg;
            status.style.color = color;
        }

        // 1. طلب رمز التحقق (OTP)
        async function requestOTP() {
            const username = document.getElementById('regUser').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPass').value;
            const btn = document.getElementById('btnRegister');

            if (!username || !email || !password) return showStatus("يرجى تعبئة جميع الحقول", "red");

            tempRegData = { email, username, password };
            
            btn.innerText = "جاري الإرسال..."; btn.disabled = true;
            showStatus("نرسل الرمز إلى بريدك...", "blue");

            try {
                const res = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "send_otp", email, username })
                });
                const data = await res.json();

                if (data.success) {
                    switchForm('otpForm', 'أدخل رمز التحقق');
                    showStatus("تم إرسال الرمز بنجاح!", "green");
                } else {
                    showStatus(data.message, "red");
                }
            } catch (err) {
                showStatus("خطأ في الاتصال بالخادم", "red");
            }
            btn.innerText = "إرسال رمز التحقق"; btn.disabled = false;
        }

        // 2. التحقق من الرمز وإنشاء الحساب
        async function verifyOTP() {
            const otp = document.getElementById('otpCode').value.trim();
            const btn = document.getElementById('btnVerify');

            if (!otp) return showStatus("يرجى إدخال الرمز", "red");

            btn.innerText = "جاري الإنشاء..."; btn.disabled = true;

            try {
                const res = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: "verify_and_register",
                        email: tempRegData.email,
                        username: tempRegData.username,
                        password: tempRegData.password,
                        otp: otp
                    })
                });
                const data = await res.json();

                if (data.success) {
                    showStatus(data.message, "green");
                    localStorage.setItem('royal_user', JSON.stringify(data.userData));
                    setTimeout(() => window.location.href = indexPage, 1500);
                } else {
                    showStatus(data.message, "red");
                }
            } catch (err) {
                showStatus("خطأ في الاتصال بالخادم", "red");
            }
            btn.innerText = "تأكيد وإنشاء الحساب"; btn.disabled = false;
        }

        // 3. تسجيل الدخول العادي وجلب المكتبة
        async function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPass').value;
            const btn = document.getElementById('btnLogin');

            if (!email || !password) return showStatus("أدخل الإيميل وكلمة المرور", "red");

            btn.innerText = "جاري الدخول..."; btn.disabled = true;
            showStatus("جاري التحقق من البيانات...", "blue");

            try {
                const res = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "login", email, password })
                });
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('royal_user', JSON.stringify(data.userData));
                    showStatus("تم الدخول! جاري مزامنة مكتبتك...", "green");
                    
                    // جلب الكتب من درايف بعد الدخول
                    await fetchUserLibrary(data.userData.id, data.userData.username);
                    window.location.href = 'index.html';
                } else {
                    showStatus(data.message, "red");
                }
            } catch (err) {
                showStatus("خطأ في الاتصال", "red");
            }
            btn.innerText = "تسجيل الدخول"; btn.disabled = false;
        }

        // دالة مساعدة لجلب الكتب
        async function fetchUserLibrary(userId, username) {
            try {
                const res = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "fetch_library", userId, userName: username })
                });
                const data = await res.json();
                if (data.success && data.books) {
                    localStorage.setItem('royal_books_list', JSON.stringify(data.books));
                }
            } catch (e) {
                console.error("فشل مزامنة المكتبة");
            }
        }
    </script>
</body>
</html>
