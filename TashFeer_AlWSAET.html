<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خزنة تشفير الوسائط</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #27ae60;
            --bg-color: #ecf0f1;
            --text-color: #333;
            --box-bg: #fff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background-color: var(--box-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
            margin-bottom: 20px;
        }

        h2, h3 {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        input[type="file"], input[type="text"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            flex: 1;
            min-width: 200px;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s ease;
        }

        button:hover {
            background-color: #1a252f;
        }

        .btn-success { background-color: var(--secondary); }
        .btn-success:hover { background-color: #219a52; }
        
        .btn-import-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .btn-import-wrapper input[type="file"] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        .hidden { display: none !important; }

        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .media-card {
            background: #f9f9f9;
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .media-card img, .media-card video {
            max-width: 100%;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .media-card audio {
            width: 100%;
            margin-bottom: 10px;
        }

        .media-key-badge {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .section-title {
            margin-top: 30px;
            background: #e8ecef;
            padding: 10px;
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <div class="container" id="encoder-section">
        <h2>قسم تشفير الوسائط</h2>
        
        <div class="form-group">
            <input type="file" id="mediaInput" accept="image/*,audio/*,video/*">
            <input type="text" id="customKeyInput" placeholder="أدخل الرمز المخصص لهذه الوسائط">
            <button onclick="encryptAndSave()">تأكيد حفظ الشفرة</button>
        </div>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

        <div class="form-group">
            <div class="btn-import-wrapper">
                <button class="btn-success">استيراد ملف JSON 📥</button>
                <input type="file" id="jsonImportInput" accept=".json" onchange="importJsonFile(event)">
            </div>
            
            <button id="btnDownload" class="hidden btn-success" onclick="downloadVault()">تنزيل ملف التشفير 💾</button>
            <button id="btnDecode" class="hidden" onclick="showDecodedMedia()">فك التشفير 🔓</button>
        </div>
    </div>

    <div class="container hidden" id="decoder-section">
        <h2>الوسائط المفككة (قائمة العرض)</h2>
        
        <h3 class="section-title">🖼️ الصور</h3>
        <div id="imagesContainer" class="media-grid"></div>

        <h3 class="section-title">🎵 الصوتيات</h3>
        <div id="audioContainer" class="media-grid"></div>

        <h3 class="section-title">🎥 الفيديوهات</h3>
        <div id="videoContainer" class="media-grid"></div>
    </div>

    <script>
        // الكائن الرئيسي لحفظ الشفرات
        let mediaVault = {};

        // 1. تحويل الوسائط إلى شفرة (Base64) وحفظها تحت الرمز المخصص
        function encryptAndSave() {
            const fileInput = document.getElementById('mediaInput');
            const keyInput = document.getElementById('customKeyInput').value.trim();

            if (fileInput.files.length === 0) {
                alert("الرجاء اختيار ملف وسائط أولاً.");
                return;
            }
            if (!keyInput) {
                alert("الرجاء إدخال رمز مخصص.");
                return;
            }

            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = function(e) {
                const base64Data = e.target.result; // النص المشفر
                
                // حفظ الشفرة في الكائن باستخدام الرمز المخصص
                mediaVault[keyInput] = {
                    type: file.type,
                    data: base64Data
                };

                alert(`تم تشفير الوسائط وحفظها بنجاح تحت الرمز: [ ${keyInput} ]`);
                
                // تنظيف المدخلات
                fileInput.value = "";
                document.getElementById('customKeyInput').value = "";
                
                // إظهار الأزرار المخفية
                updateUI();
            };

            reader.onerror = function() {
                alert("حدث خطأ أثناء قراءة الملف.");
            };

            // بدء قراءة الملف وتحويله إلى Base64
            reader.readAsDataURL(file);
        }

        // 2. تنزيل ملف التشفير (JSON)
        function downloadVault() {
            if (Object.keys(mediaVault).length === 0) {
                alert("لا توجد وسائط مشفرة لتنزيلها.");
                return;
            }

            const dataStr = JSON.stringify(mediaVault, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement("a");
            a.href = url;
            a.download = "encrypted_media_vault.json";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // 3. استيراد ملف JSON يحتوي على تشفيرات سابقة
        function importJsonFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    // دمج البيانات المستوردة مع البيانات الحالية (يضيف الجديد ويحدث المتشابه)
                    mediaVault = { ...mediaVault, ...importedData };
                    alert("تم استيراد الشفرات بنجاح. يمكنك الآن إضافة المزيد أو فك التشفير.");
                    updateUI();
                } catch (error) {
                    alert("ملف JSON غير صالح أو تالف.");
                }
            };
            reader.readAsText(file);
            event.target.value = ""; // تصفير حقل الاستيراد
        }

        // 4. إظهار أو إخفاء أزرار التنزيل وفك التشفير بناءً على وجود بيانات
        function updateUI() {
            const hasData = Object.keys(mediaVault).length > 0;
            const btnDownload = document.getElementById('btnDownload');
            const btnDecode = document.getElementById('btnDecode');

            if (hasData) {
                btnDownload.classList.remove('hidden');
                btnDecode.classList.remove('hidden');
            }
        }

        // 5. فك التشفير وعرض الوسائط بحسب نوعها
        function showDecodedMedia() {
            const decoderSection = document.getElementById('decoder-section');
            decoderSection.classList.remove('hidden');

            const imagesContainer = document.getElementById('imagesContainer');
            const audioContainer = document.getElementById('audioContainer');
            const videoContainer = document.getElementById('videoContainer');

            // تفريغ الحاويات قبل العرض
            imagesContainer.innerHTML = "";
            audioContainer.innerHTML = "";
            videoContainer.innerHTML = "";

            let hasImages = false, hasAudio = false, hasVideo = false;

            for (const [key, mediaData] of Object.entries(mediaVault)) {
                const card = document.createElement('div');
                card.className = 'media-card';
                
                const badge = document.createElement('div');
                badge.className = 'media-key-badge';
                badge.textContent = `الرمز: ${key}`;
                card.appendChild(badge);

                if (mediaData.type.startsWith('image/')) {
                    const img = document.createElement('img');
                    img.src = mediaData.data;
                    card.appendChild(img);
                    imagesContainer.appendChild(card);
                    hasImages = true;
                } 
                else if (mediaData.type.startsWith('audio/')) {
                    const audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = mediaData.data;
                    card.appendChild(audio);
                    audioContainer.appendChild(card);
                    hasAudio = true;
                } 
                else if (mediaData.type.startsWith('video/')) {
                    const video = document.createElement('video');
                    video.controls = true;
                    video.src = mediaData.data;
                    card.appendChild(video);
                    videoContainer.appendChild(card);
                    hasVideo = true;
                }
            }

            // إظهار رسالة إذا كانت الحاوية فارغة من هذا النوع
            if (!hasImages) imagesContainer.innerHTML = "<p>لا توجد صور مشفرة.</p>";
            if (!hasAudio) audioContainer.innerHTML = "<p>لا توجد صوتيات مشفرة.</p>";
            if (!hasVideo) videoContainer.innerHTML = "<p>لا توجد فيديوهات مشفرة.</p>";
            
            // التمرير للأسفل لرؤية النتائج
            decoderSection.scrollIntoView({ behavior: "smooth" });
        }
    </script>
</body>
</html>
